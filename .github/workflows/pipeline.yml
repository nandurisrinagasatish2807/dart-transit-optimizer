name: DART Optimizer CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn streamlit

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=src" >> $GITHUB_ENV

    - name: Ensure Artifacts Directory Exists
      run: mkdir -p artifacts/data

    - name: Run Phase 7 Executive Reporter (Verify Output if Artifacts Present)
      run: |
        python -c "import os; print('Artifacts status:', os.listdir('artifacts/data'))"